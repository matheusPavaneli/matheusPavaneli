<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="270" viewBox="0 0 1000 270" fill="none" role="img" aria-label="Matheus Pavaneli — Senior Software Engineer. Systems blueprint.">
  <defs>
    <!-- blueprint grid -->
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" stroke="#1b2027" stroke-width="1"/>
    </pattern>
    <pattern id="gridfine" width="130" height="130" patternUnits="userSpaceOnUse">
      <path d="M130 0H0V130" stroke="#232a33" stroke-width="1"/>
    </pattern>
    <radialGradient id="vignette" cx="30%" cy="35%" r="90%">
      <stop offset="0%" stop-color="#0e1116"/>
      <stop offset="100%" stop-color="#090b0e"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcf6b"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono { font-family: 'DejaVu Sans Mono','SFMono-Regular','Consolas','Courier New',monospace; }
      .edge { stroke:#2f3a46; stroke-width:1.4; }
      .flow {
        stroke:url(#amber); stroke-width:1.6; fill:none;
        stroke-dasharray:14 150; stroke-linecap:round;
        animation: flow 3.4s linear infinite;
      }
      .flow.d1{ animation-delay:0s } .flow.d2{ animation-delay:.55s }
      .flow.d3{ animation-delay:1.1s } .flow.d4{ animation-delay:1.65s }
      .flow.d5{ animation-delay:2.2s } .flow.d6{ animation-delay:2.75s }
      @keyframes flow { from{ stroke-dashoffset:164 } to{ stroke-dashoffset:0 } }
      .node { fill:#0e1116; stroke:#3a4653; stroke-width:1.4; }
      .node.live { stroke:url(#amber); animation: pulse 2.6s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{ opacity:.55 } 50%{ opacity:1 } }
      .lbl { fill:#7f8c9b; font-size:9.5px; letter-spacing:.5px; }
      .caret { animation: blink 1.05s steps(1) infinite; }
      @keyframes blink { 0%,49%{ opacity:1 } 50%,100%{ opacity:0 } }
      .rise { opacity:0; transform:translateY(6px); animation: rise .8s ease forwards; }
      .r1{ animation-delay:.35s } .r2{ animation-delay:.6s } .r3{ animation-delay:.85s } .r4{ animation-delay:1.1s }
      @keyframes rise { to{ opacity:1; transform:translateY(0) } }
      .draw { stroke-dasharray:600; stroke-dashoffset:600; animation: draw 1.8s ease .3s forwards; }
      @keyframes draw { to{ stroke-dashoffset:0 } }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1000" height="270" rx="10" fill="url(#vignette)"/>
  <rect width="1000" height="270" rx="10" fill="url(#gridfine)"/>
  <rect width="1000" height="270" rx="10" fill="url(#grid)" opacity=".6"/>
  <rect x="1" y="1" width="998" height="268" rx="10" fill="none" stroke="#2a323c" stroke-width="1.4"/>

  <!-- corner ticks -->
  <g stroke="#f5a623" stroke-width="1.6">
    <path d="M16 30V16H30"/><path d="M984 30V16H970"/>
    <path d="M16 240V254H30"/><path d="M984 240V254H970"/>
  </g>

  <!-- top rail -->
  <text x="34" y="34" class="mono lbl" fill="#5c6773" font-size="10">SYSTEMS // node-graph</text>
  <text x="966" y="34" text-anchor="end" class="mono" fill="#f5a623" font-size="10" opacity=".9">&#9679; LIVE</text>

  <!-- ============ left: service graph ============ -->
  <g transform="translate(46,54)">
    <g class="edge" fill="none">
      <path d="M60 40 L165 22"/>
      <path d="M60 40 L92 128"/>
      <path d="M165 22 L165 108"/>
      <path d="M165 108 L280 78"/>
      <path d="M92 128 L165 108"/>
      <path d="M280 78 L300 158"/>
    </g>
    <g fill="none">
      <path class="flow d1" d="M60 40 L165 22"/>
      <path class="flow d3" d="M60 40 L92 128"/>
      <path class="flow d2" d="M165 22 L165 108"/>
      <path class="flow d4" d="M165 108 L280 78"/>
      <path class="flow d5" d="M92 128 L165 108"/>
      <path class="flow d6" d="M280 78 L300 158"/>
    </g>
    <g class="mono">
      <circle class="node live" cx="60"  cy="40"  r="6"/><text class="lbl" x="60"  y="24"  text-anchor="middle">kafka</text>
      <circle class="node"      cx="165" cy="22"  r="6"/><text class="lbl" x="165" y="8"   text-anchor="middle">api</text>
      <circle class="node live" cx="165" cy="108" r="7"/><text class="lbl" x="165" y="128" text-anchor="middle">k8s</text>
      <circle class="node live" cx="92"  cy="128" r="6"/><text class="lbl" x="92"  y="148" text-anchor="middle">rabbitmq</text>
      <circle class="node"      cx="280" cy="78"  r="6"/><text class="lbl" x="280" y="62"  text-anchor="middle">postgres</text>
      <circle class="node"      cx="300" cy="158" r="6"/><text class="lbl" x="300" y="178" text-anchor="middle">redis</text>
    </g>
  </g>

  <!-- divider -->
  <line x1="410" y1="60" x2="410" y2="210" stroke="#232a33" stroke-width="1"/>

  <!-- ============ right: identity ============ -->
  <g transform="translate(452,0)">
    <text x="0" y="98" class="mono rise r1" fill="#e8edf2" font-size="40" font-weight="700" letter-spacing="1">MATHEUS</text>
    <text x="0" y="146" class="mono rise r2" fill="url(#amber)" font-size="40" font-weight="700" letter-spacing="1">PAVANELI<tspan class="caret" fill="#f5a623" dx="6">_</tspan></text>
    <text x="2" y="176" class="mono rise r3" fill="#9aa7b4" font-size="13" letter-spacing="2">senior software engineer</text>

    <!-- oscilloscope -->
    <g transform="translate(2,196)" class="rise r4">
      <rect x="0" y="0" width="480" height="34" rx="4" fill="#0b0e12" stroke="#232a33"/>
      <clipPath id="scope"><rect x="4" y="2" width="472" height="30" rx="3"/></clipPath>
      <g clip-path="url(#scope)">
        <path class="draw" d="M6 17 Q 30 2 54 17 T 102 17 T 150 17 T 198 17 T 246 17 T 294 17 T 342 17 T 390 17 T 438 17 T 486 17"
              stroke="url(#amber)" stroke-width="1.6" fill="none" filter="url(#glow)"/>
        <circle r="2.6" fill="#fff">
          <animateMotion dur="2.4s" repeatCount="indefinite"
            path="M6 17 Q 30 2 54 17 T 102 17 T 150 17 T 198 17 T 246 17 T 294 17 T 342 17 T 390 17 T 438 17 T 486 17"/>
        </circle>
      </g>
      <text x="470" y="-6" text-anchor="end" class="mono lbl" fill="#5c6773">productivity &#183; above &#183; all</text>
    </g>
  </g>
</svg>
