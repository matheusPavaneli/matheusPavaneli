<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="392" viewBox="0 0 1000 392" fill="none" role="img" aria-label="Stack by concern — the systems I build and the tools at each layer">
  <defs>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3e46"/>
      <stop offset=".5" stop-color="#6b7079"/>
      <stop offset="1" stop-color="#3a3e46"/>
    </linearGradient>
    <filter id="pt" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:'SFMono-Regular','Consolas','Liberation Mono','Courier New',monospace;}
      .serif{font-family:'Iowan Old Style','Palatino Linotype','Georgia','Times New Roman',serif;}
      .row{opacity:0;animation:in 1s ease forwards;}
      .r0{animation-delay:.35s}.r1{animation-delay:.5s}.r2{animation-delay:.65s}.r3{animation-delay:.8s}
      .r4{animation-delay:.95s}.r5{animation-delay:1.1s}.r6{animation-delay:1.25s}.r7{animation-delay:1.4s}
      @keyframes in{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
      .spine{stroke-dasharray:280;stroke-dashoffset:280;animation:draw 1.5s ease .1s forwards;}
      @keyframes draw{to{stroke-dashoffset:0}}
      .head{opacity:0;animation:fade 1.2s ease forwards;}
      @keyframes fade{to{opacity:1}}
      .concern{fill:#7f858f;letter-spacing:3px;}
      .tech{fill:#dfe3e9;letter-spacing:.3px;}
      .dot{fill:#f4f6f9;}
    </style>
  </defs>

  <rect width="1000" height="392" fill="#060607"/>

  <text x="60" y="46" class="mono head concern" font-size="11">STACK &#8212; BY CONCERN</text>
  <text x="60" y="66" class="mono head" fill="#565b64" font-size="10.5" letter-spacing=".5">focus &#8212; distributed systems under load &#183; security architecture</text>
  <text x="940" y="46" text-anchor="end" class="serif head" fill="#565b64" font-size="15" font-style="italic">a request, from client to disk</text>

  <!-- spine + descending signal -->
  <g transform="translate(300,0)">
    <line x1="0" y1="82" x2="0" y2="346" class="spine" stroke="url(#spine)" stroke-width="1.4"/>
    <circle r="2.8" class="dot" filter="url(#pt)">
      <animate attributeName="cy" values="82;346" dur="3.8s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g class="mono" font-size="13">
    <g class="row r0">
      <text x="284" y="94"  text-anchor="end" class="concern" font-size="10.5">CLIENT</text>
      <circle cx="300" cy="90" r="3" fill="#565b64"/>
      <text x="322" y="94"  class="tech">React &#183; Next.js &#183; Vue &#183; Angular &#183; Tailwind</text>
    </g>
    <g class="row r1">
      <text x="284" y="126" text-anchor="end" class="concern" font-size="10.5">RUNTIME</text>
      <circle cx="300" cy="122" r="3" fill="#565b64"/>
      <text x="322" y="126" class="tech">Node.js &#183; TypeScript &#183; PHP</text>
    </g>
    <g class="row r2">
      <text x="284" y="158" text-anchor="end" class="concern" font-size="10.5">SERVICES</text>
      <circle cx="300" cy="154" r="3.4" fill="#8b9099"/>
      <text x="322" y="158" class="tech">NestJS &#183; Fastify &#183; Express &#183; Laravel</text>
    </g>
    <g class="row r3">
      <text x="284" y="190" text-anchor="end" class="concern" font-size="10.5">DESIGN</text>
      <circle cx="300" cy="186" r="3.4" fill="#8b9099"/>
      <text x="322" y="190" class="tech">Microservices &#183; EDA &#183; Hexagonal &#183; DDD &#183; CQRS &#183; Serverless</text>
    </g>
    <g class="row r4">
      <text x="284" y="222" text-anchor="end" class="concern" font-size="10.5">MESSAGING</text>
      <circle cx="300" cy="218" r="3.4" fill="#8b9099"/>
      <text x="322" y="222" class="tech">Kafka &#183; RabbitMQ &#183; BullMQ</text>
    </g>
    <g class="row r5">
      <text x="284" y="254" text-anchor="end" class="concern" font-size="10.5">DATA</text>
      <circle cx="300" cy="250" r="3.4" fill="#8b9099"/>
      <text x="322" y="254" class="tech">PostgreSQL &#183; MySQL &#183; MongoDB &#183; DynamoDB &#183; Cassandra &#183; Firebase</text>
    </g>
    <g class="row r6">
      <text x="284" y="286" text-anchor="end" class="concern" font-size="10.5">CLOUD</text>
      <circle cx="300" cy="282" r="3.4" fill="#8b9099"/>
      <text x="322" y="286" class="tech">AWS &#183; Azure &#183; Docker &#183; Kubernetes &#183; Nginx &#183; Linux</text>
    </g>
    <g class="row r7">
      <text x="284" y="318" text-anchor="end" class="concern" font-size="10.5">RIGOR</text>
      <circle cx="300" cy="314" r="3" fill="#565b64"/>
      <text x="322" y="318" class="tech">REST &#183; GraphQL &#183; Jest &#183; Detox &#183; CI/CD</text>
    </g>
  </g>
</svg>
