<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="360" viewBox="0 0 1000 360" fill="none" role="img" aria-label="Stack by concern — the systems I build and the tools at each layer">
  <defs>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3e46"/>
      <stop offset=".5" stop-color="#6b7079"/>
      <stop offset="1" stop-color="#3a3e46"/>
    </linearGradient>
    <filter id="pt" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:'SFMono-Regular','Consolas','Liberation Mono','Courier New',monospace;}
      .serif{font-family:'Iowan Old Style','Palatino Linotype','Georgia','Times New Roman',serif;}
      .row{opacity:0;animation:in 1s ease forwards;}
      .r0{animation-delay:.35s}.r1{animation-delay:.55s}.r2{animation-delay:.75s}
      .r3{animation-delay:.95s}.r4{animation-delay:1.15s}.r5{animation-delay:1.35s}.r6{animation-delay:1.55s}
      @keyframes in{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
      .spine{stroke-dasharray:260;stroke-dashoffset:260;animation:draw 1.4s ease .1s forwards;}
      @keyframes draw{to{stroke-dashoffset:0}}
      .head{opacity:0;animation:fade 1.2s ease forwards;}
      @keyframes fade{to{opacity:1}}
      .concern{fill:#7f858f;letter-spacing:3px;}
      .tech{fill:#dfe3e9;letter-spacing:.4px;}
      .dot{fill:#f4f6f9;}
    </style>
  </defs>

  <rect width="1000" height="360" fill="#060607"/>

  <!-- heading -->
  <text x="60" y="46" class="mono head concern" font-size="11">STACK &#8212; BY CONCERN</text>
  <text x="940" y="46" text-anchor="end" class="serif head" fill="#565b64" font-size="15" font-style="italic">a request, from edge to disk</text>

  <!-- vertical spine with descending signal (request path) -->
  <g transform="translate(300,0)">
    <line x1="0" y1="78" x2="0" y2="326" class="spine" stroke="url(#spine)" stroke-width="1.4"/>
    <circle r="2.8" class="dot" filter="url(#pt)">
      <animate attributeName="cy" values="78;326" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines=".45 0 .55 1"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="3.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- layers: concern (left, dim) | node | tools (right, bright) -->
  <g class="mono" font-size="13.5">
    <!-- row template: label@284 end, node@300, tools@322 -->
    <g class="row r0">
      <text x="284" y="94"  text-anchor="end" class="concern" font-size="10.5">EDGE</text>
      <circle cx="300" cy="90" r="3" fill="#565b64"/>
      <text x="322" y="94"  class="tech">Nginx &#183; REST &#183; gRPC</text>
    </g>
    <g class="row r1">
      <text x="284" y="130" text-anchor="end" class="concern" font-size="10.5">RUNTIME</text>
      <circle cx="300" cy="126" r="3" fill="#565b64"/>
      <text x="322" y="130" class="tech">Node.js &#183; TypeScript</text>
    </g>
    <g class="row r2">
      <text x="284" y="166" text-anchor="end" class="concern" font-size="10.5">SERVICES</text>
      <circle cx="300" cy="162" r="3.4" fill="#8b9099"/>
      <text x="322" y="166" class="tech">NestJS &#183; Express &#183; GraphQL</text>
    </g>
    <g class="row r3">
      <text x="284" y="202" text-anchor="end" class="concern" font-size="10.5">MESSAGING</text>
      <circle cx="300" cy="198" r="3.4" fill="#8b9099"/>
      <text x="322" y="202" class="tech">Kafka &#183; RabbitMQ &#183; BullMQ</text>
    </g>
    <g class="row r4">
      <text x="284" y="238" text-anchor="end" class="concern" font-size="10.5">STATE</text>
      <circle cx="300" cy="234" r="3.4" fill="#8b9099"/>
      <text x="322" y="238" class="tech">PostgreSQL &#183; MongoDB &#183; Redis &#183; Prisma</text>
    </g>
    <g class="row r5">
      <text x="284" y="274" text-anchor="end" class="concern" font-size="10.5">PLATFORM</text>
      <circle cx="300" cy="270" r="3" fill="#565b64"/>
      <text x="322" y="274" class="tech">Docker &#183; Kubernetes &#183; AWS &#183; Azure &#183; Linux</text>
    </g>
    <g class="row r6">
      <text x="284" y="310" text-anchor="end" class="concern" font-size="10.5">RIGOR</text>
      <circle cx="300" cy="306" r="3" fill="#565b64"/>
      <text x="322" y="310" class="tech">Jest &#183; CI &#183; observability</text>
    </g>
  </g>
</svg>
